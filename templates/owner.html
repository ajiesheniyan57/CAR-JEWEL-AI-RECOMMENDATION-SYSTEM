<!DOCTYPE html>
<html>
<head>
<title>Owner Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
<h3>👨‍💼 Owner Dashboard</h3>

<input type="file" id="file" class="form-control mb-2">
<button class="btn btn-success w-100" onclick="upload()">Upload Dataset</button>

<a href="/" class="btn btn-secondary w-100 mt-3">Logout</a>
</div>

<script>
function upload(){
const f = file.files[0];
if(!f) return alert("Select file");

const fd = new FormData();
fd.append("file", f);
fd.append("username", "admin");

fetch("/upload",{
method:"POST",
body:fd
})
.then(r=>r.text())
.then(msg=>alert(msg));
}
</script>

</body>
</html>
