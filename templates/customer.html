<!DOCTYPE html>
<html>
<head>
<title>Customer Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
<h3>👤 Customer Panel</h3>

<select id="interior" class="form-select mb-2"></select>
<select id="exterior" class="form-select mb-2"></select>
<select id="style" class="form-select mb-2"></select>

<input id="price" class="form-control mb-2" value="500">
<input id="top_n" class="form-control mb-2" value="5">

<button class="btn btn-dark w-100" onclick="recommend()">Recommend</button>

<ul id="results" class="list-group mt-3"></ul>

<a href="/" class="btn btn-secondary w-100 mt-3">Back to Login</a>
</div>

<script>
function loadOptions(){
fetch("/get-options")
.then(r=>r.json())
.then(d=>{
if(d.error) return;

interior.innerHTML="";
exterior.innerHTML="";
style.innerHTML="";

d.interiors.forEach(v=>interior.innerHTML+=`<option>${v}</option>`);
d.exteriors.forEach(v=>exterior.innerHTML+=`<option>${v}</option>`);
d.styles.forEach(v=>style.innerHTML+=`<option>${v}</option>`);
});
}

function recommend(){
fetch("/recommend",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
interior:interior.value,
exterior:exterior.value,
style:style.value,
price:price.value,
top_n:top_n.value
})
})
.then(r=>r.json())
.then(data=>{
results.innerHTML="";
data.forEach(i=>{
results.innerHTML+=`<li class="list-group-item">${i.Product} | ₹${i.Price}</li>`;
});
});
}

window.onload = loadOptions;
</script>

</body>
</html>
