<!DOCTYPE html>
<html>
<head>
<title>Car Jewel AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
<h2 class="text-warning text-center">🚗 Car Jewel AI</h2>

<div class="row mt-4">

<!-- OWNER -->
<div class="col-md-4">
<div class="card p-3 bg-secondary">
<h5>Owner</h5>

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-warning w-100 mb-2" onclick="login()">Login</button>

<!-- 🔥 Upload (CORRECT PLACE) -->
<input type="file" id="file" class="form-control mb-2">
<button class="btn btn-success w-100" onclick="upload()">Upload Dataset</button>

</div>
</div>

<!-- CUSTOMER -->
<div class="col-md-8">
<div class="card p-3 bg-secondary">
<h5>Customer</h5>

<select id="interior" class="form-select mb-2"></select>
<select id="exterior" class="form-select mb-2"></select>
<select id="style" class="form-select mb-2"></select>

<input id="price" class="form-control mb-2" value="500">
<input id="top_n" class="form-control mb-2" value="5">

<button class="btn btn-dark w-100" onclick="recommend()">Recommend</button>

<ul id="results" class="list-group mt-3"></ul>

</div>
</div>

</div>
</div>

<script>

// LOAD OPTIONS
function loadOptions(){
fetch("/get-options")
.then(r=>r.json())
.then(d=>{
if(d.error) return;

interior.innerHTML="";
exterior.innerHTML="";
style.innerHTML="";

d.interiors.forEach(v=>interior.innerHTML+=`<option>${v}</option>`);
d.exteriors.forEach(v=>exterior.innerHTML+=`<option>${v}</option>`);
d.styles.forEach(v=>style.innerHTML+=`<option>${v}</option>`);
});
}

// LOGIN
function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(()=>alert("Login success"));
}

// 🔥 UPLOAD FUNCTION (YOU MISSED THIS)
function upload(){
const f = document.getElementById("file").files[0];

if(!f) return alert("Select file first");

const fd = new FormData();
fd.append("file", f);
fd.append("username", username.value);

fetch("/upload",{
method:"POST",
body:fd
})
.then(r=>r.text())
.then(msg=>{
alert(msg);
loadOptions();
});
}

// RECOMMEND
function recommend(){
fetch("/recommend",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
interior:interior.value,
exterior:exterior.value,
style:style.value,
price:price.value,
top_n:top_n.value
})
})
.then(r=>r.json())
.then(data=>{
results.innerHTML="";
data.forEach(i=>{
results.innerHTML+=`<li class="list-group-item">${i.Product} | ₹${i.Price}</li>`;
});
});
}

window.onload = loadOptions;

</script>

</body>
</html>
